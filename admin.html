<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Project Management – Morobo</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    .a-wrap { max-width: 820px; margin: 0 auto; }
    .a-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-card); margin-bottom: 1.25rem; }
    .a-proj-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .a-proj-title { font-size: 1.15rem; font-weight: 700; color: var(--text); }
    .a-pid { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.76rem; color: var(--accent); background: var(--accent-dim); padding: 0.3rem 0.55rem; border-radius: 7px; }
    .a-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; margin-bottom: 0.85rem; }
    .a-field label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); font-weight: 700; margin-bottom: 0.35rem; }
    .a-input, .a-select, .a-textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.7rem 0.85rem; color: var(--text); font-family: inherit; font-size: 16px; -webkit-appearance: none;
    }
    .a-textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
    .a-input:focus, .a-select:focus, .a-textarea:focus { outline: none; border-color: var(--border-accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .a-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
    .a-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.1rem; border-radius: var(--radius); font-family: inherit; font-size: 0.85rem; font-weight: 600; border: none; cursor: pointer; }
    .a-btn-primary { background: var(--accent); color: #fff; }
    .a-btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .a-btn-danger { background: transparent; border: 1px solid rgba(239,68,68,0.4); color: #ef4444; }
    .a-btn-link { background: transparent; border: none; color: var(--accent); cursor: pointer; font-size: 0.8rem; font-family: inherit; padding: 0; }
    .a-updates { margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem; }
    .a-update { display: flex; gap: 0.75rem; font-size: 0.85rem; color: var(--text-secondary); padding: 0.4rem 0; }
    .a-update .d { color: var(--text-muted); flex-shrink: 0; width: 84px; }
    .a-msg { font-size: 0.85rem; padding: 0.6rem 0.85rem; border-radius: var(--radius); margin-top: 0.6rem; display: none; }
    .a-msg.ok { background: rgba(34,197,94,0.12); color: #16a34a; display: block; }
    .a-msg.err { background: rgba(239,68,68,0.12); color: #ef4444; display: block; }
    @media (max-width: 560px) { .a-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <canvas id="backgroundCanvas"></canvas>

  <header class="navbar">
    <div class="container nav-content">
      <a href="index.html" class="logo">
        <img src="images/MoroboIconFinal.png" alt="Morobo Logo" class="logo-icon">
        Morobo
      </a>
      <nav class="nav-tabs" id="navTabs">
        <a href="apps.html" class="nav-tab">Apps</a>
        <a href="websites.html" class="nav-tab">Websites</a>
        <a href="about.html" class="nav-tab">About</a>
        <a href="index.html#contact" class="nav-tab">Contact</a>
      </nav>
      <button class="nav-burger" id="navBurger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <!-- Login -->
  <section id="loginScreen" class="section" style="padding-top:8rem; display:none;">
    <div class="container">
      <div class="a-card" style="max-width:420px; margin:0 auto;">
        <h2 style="margin-bottom:0.3rem;">Admin Access</h2>
        <p style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:1.5rem;">Enter the admin password to manage client projects.</p>
        <form id="loginForm">
          <div class="a-field" style="margin-bottom:1.2rem;"><label for="password">Admin password</label><input class="a-input" type="password" id="password" autocomplete="current-password" required></div>
          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Access admin panel</button>
        </form>
        <div class="a-msg" id="loginMsg"></div>
      </div>
    </div>
  </section>

  <!-- Panel -->
  <section id="adminPanel" class="section" style="padding-top:7rem; display:none;">
    <div class="container">
      <div class="a-wrap">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:2rem; flex-wrap:wrap;">
          <div>
            <h1 style="font-size:clamp(1.6rem,5vw,2.2rem); margin-bottom:0.2rem;">Project Dashboard</h1>
            <p style="color:var(--text-muted); font-size:0.9rem;" id="adminWho"></p>
          </div>
          <button class="a-btn a-btn-ghost" id="logoutBtn">Log out</button>
        </div>

        <!-- New project -->
        <div class="a-card">
          <h3 style="margin-bottom:1rem;">New project</h3>
          <div class="a-row">
            <div class="a-field"><label for="npClient">Client / business</label><input class="a-input" id="npClient" placeholder="Yogi's Deli & Grill"></div>
            <div class="a-field"><label for="npApp">App / project name</label><input class="a-input" id="npApp" placeholder="Yogi's Deli App"></div>
          </div>
          <div class="a-actions"><button class="a-btn a-btn-primary" id="createBtn">Create project</button></div>
          <div class="a-msg" id="createMsg"></div>
        </div>

        <h2 style="font-size:1.1rem; margin:1.5rem 0 1rem;">Projects</h2>
        <div id="projectsList"><p style="color:var(--text-muted);">Loading…</p></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-content">
      <a href="index.html" class="footer-logo-link"><img src="images/MoroboIconFinal.png" alt="Morobo">Morobo</a>
      <p class="footer-copy">&copy; <span id="year"></span> Morobo LLC</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
  <script src="admin.js"></script>
</body>
</html>
